spring.application.name=orderflow

# Configurań§es de ConexŃo com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/orderflow
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurań§es do JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

# Garante que o Flyway estß ativo para gerenciar suas migrations
spring.flyway.enabled=true